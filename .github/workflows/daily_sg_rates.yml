name: Daily SG Rates Collector

on:
  schedule:
    # 1:30am UTC = ~9:30am Singapore time, after MAS typically publishes
    # SORA for the previous business day (by 9am SGT per MAS docs).
    - cron: '30 1 * * *'
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write  # needed to commit the updated sg_rates.json back to the repo

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run collector
        env:
          MAS_API_KEY: ${{ secrets.MAS_API_KEY }}  # optional, only needed once you have one
        run: python fetch_sg_rates.py

      - name: Commit and push if changed
        run: |
          git config user.name "sg-rates-bot"
          git config user.email "actions@github.com"
          git add sg_rates.json
          git diff --quiet --cached || git commit -m "Daily SG rates update: $(date -u +%Y-%m-%d)"
          git push

